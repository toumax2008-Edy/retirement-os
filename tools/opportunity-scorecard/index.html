<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opportunity Scorecard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1c2430;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-ink: #ffffff;
      --warn: #b45309;
      --danger: #b42318;
      --good: #15803d;
      --shadow: 0 14px 35px rgba(28, 36, 48, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 18px;
      align-items: start;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: 0;
    }

    label {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
      color: #344054;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
      font: inherit;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .score-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }

    .score-row {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) 170px 32px;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .score-row strong {
      display: block;
      font-size: 14px;
    }

    .score-row span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    input[type="range"] {
      padding: 0;
      accent-color: var(--accent);
    }

    .score-value {
      text-align: right;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .result {
      display: grid;
      gap: 14px;
    }

    .total {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .total strong {
      font-size: 48px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      background: #e6f4f1;
      color: var(--accent);
      font-weight: 800;
      font-size: 13px;
    }

    .badge.warn {
      background: #fff7ed;
      color: var(--warn);
    }

    .badge.good {
      background: #ecfdf3;
      color: var(--good);
    }

    .badge.danger {
      background: #fef3f2;
      color: var(--danger);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--accent-ink);
      background: var(--accent);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      color: var(--ink);
      background: #eef2f7;
    }

    pre {
      min-height: 300px;
      max-height: 520px;
      overflow: auto;
      margin: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101828;
      color: #eef2ff;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.55;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .layout,
      .field-grid {
        grid-template-columns: 1fr;
      }

      .score-row {
        grid-template-columns: 1fr;
      }

      .score-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Opportunity Scorecard</h1>
      <p>案件選別、受託実績化、自社事業化の候補を同じ基準で採点し、応募・保留・見送りを決める。</p>
    </header>

    <div class="layout">
      <section aria-labelledby="input-title">
        <h2 id="input-title">入力</h2>

        <label>
          案件名
          <input id="name" value="小規模事業者向け LP 改善" autocomplete="off">
        </label>

        <div class="field-grid">
          <label>
            評価日
            <input id="reviewDate" type="date">
          </label>

          <label>
            用途
            <select id="type">
              <option>受託</option>
              <option>ポートフォリオ</option>
              <option>自社事業</option>
              <option>共通</option>
            </select>
          </label>
        </div>

        <label>
          概要
          <textarea id="summary">既存のランディングページを見直し、問い合わせ率を上げるための改善提案を行う。</textarea>
        </label>

        <div class="score-grid" id="scores"></div>

        <label>
          理由メモ
          <textarea id="reason">提案内容を他業種にも転用でき、受託実績としても見せやすい。短期間で成果物を作れる。</textarea>
        </label>

        <label>
          判断メモ・次の一手
          <textarea id="notes">提案前に、改善前後の見せ方と納品範囲を1枚に整理する。</textarea>
        </label>
      </section>

      <section class="result" aria-labelledby="result-title">
        <h2 id="result-title">判定</h2>
        <div class="total">
          <strong id="total">0</strong>
          <span>/ 35</span>
        </div>
        <div id="decision" class="badge">評価中</div>
        <p id="next-action" class="hint"></p>
        <div class="actions">
          <button id="copy">Markdown をコピー</button>
          <button id="reset" class="secondary">初期値に戻す</button>
        </div>
        <pre id="markdown"></pre>
      </section>
    </div>
  </main>

  <script>
    const criteria = [
      ["revenue", "売上性", "短期または中期で売上につながる"],
      ["reuse", "再利用性", "他案件や別事業へ転用できる"],
      ["speed", "実行速度", "小さく早く形にできる"],
      ["proof", "証明価値", "実績やポートフォリオとして見せやすい"],
      ["strategy", "戦略性", "引退OSの長期資産になる"],
      ["lowRisk", "リスク低さ", "契約・認証・支払い・個人情報の危険が少ない"],
      ["workload", "作業負荷の低さ", "短時間で無理なく完了できる"]
    ];

    const defaults = {
      revenue: 4,
      reuse: 5,
      speed: 4,
      proof: 5,
      strategy: 4,
      lowRisk: 4
    };

    const initialValues = {
      name: "小規模事業者向け LP 改善",
      type: "受託",
      summary: "既存のランディングページを見直し、問い合わせ率を上げるための改善提案を行う。",
      reason: "提案内容を他業種にも転用でき、受託実績としても見せやすい。短期間で成果物を作れる。",
      notes: "提案前に、改善前後の見せ方と納品範囲を1枚に整理する。"
    };

    const scoresEl = document.querySelector("#scores");
    const fields = ["name", "reviewDate", "type", "summary", "reason", "notes"].reduce((acc, id) => {
      acc[id] = document.querySelector(`#${id}`);
      return acc;
    }, {});

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function createScoreRows() {
      scoresEl.innerHTML = criteria.map(([id, label, help]) => `
        <div class="score-row">
          <div>
            <strong>${label}</strong>
            <span>${help}</span>
          </div>
          <input id="${id}" type="range" min="1" max="5" value="${defaults[id]}">
          <div class="score-value" id="${id}-value">${defaults[id]}</div>
        </div>
      `).join("");
    }

    function getScore(id) {
      return Number(document.querySelector(`#${id}`).value);
    }

    function getDecision(total) {
      if (total >= 28) {
        return {
          label: "応募",
          className: "badge good",
          action: "応募または提案に進める。条件、納品範囲、見せ方を短く整理する。"
        };
      }
      if (total >= 21) {
        return {
          label: "保留",
          className: "badge warn",
          action: "不足している条件を1つ確認し、改善できるなら再評価する。"
        };
      }
      return {
        label: "見送り",
        className: "badge danger",
        action: "今は追わない。学びだけ残し、必要なら archive に移す。"
      };
    }

    function buildMarkdown(total, decision) {
      const scoreLines = criteria
        .map(([id, label]) => `- ${label}: ${getScore(id)}/5`)
        .join("\n");

      return `# ${fields.name.value || "Untitled Opportunity"}

## Basic Info

- 案件名: ${fields.name.value || "-"}
- 評価日: ${fields.reviewDate.value || "-"}
- 種別: ${fields.type.value}
- 判定: ${decision.label}

## Summary

${fields.summary.value || "-"}

## Scores

${scoreLines}

合計: ${total}/35

## Reason

${fields.reason.value || "-"}

## Next Action

${decision.action}

## Notes

${fields.notes.value || "-"}`;
    }

    function update() {
      const total = criteria.reduce((sum, [id]) => sum + getScore(id), 0);
      const decision = getDecision(total);

      for (const [id] of criteria) {
        document.querySelector(`#${id}-value`).textContent = getScore(id);
      }

      document.querySelector("#total").textContent = total;
      const decisionEl = document.querySelector("#decision");
      decisionEl.textContent = decision.label;
      decisionEl.className = decision.className;
      document.querySelector("#next-action").textContent = decision.action;
      document.querySelector("#markdown").textContent = buildMarkdown(total, decision);
    }

    function resetForm() {
      fields.name.value = initialValues.name;
      fields.reviewDate.value = today();
      fields.type.value = initialValues.type;
      fields.summary.value = initialValues.summary;
      fields.reason.value = initialValues.reason;
      fields.notes.value = initialValues.notes;
      for (const [id] of criteria) {
        document.querySelector(`#${id}`).value = defaults[id];
      }
      update();
    }

    async function copyMarkdown() {
      const text = document.querySelector("#markdown").textContent;
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        const buffer = document.createElement("textarea");
        buffer.value = text;
        buffer.setAttribute("readonly", "");
        buffer.style.position = "fixed";
        buffer.style.opacity = "0";
        document.body.appendChild(buffer);
        buffer.select();
        document.execCommand("copy");
        document.body.removeChild(buffer);
      }
      document.querySelector("#copy").textContent = "コピーしました";
      setTimeout(() => {
        document.querySelector("#copy").textContent = "Markdown をコピー";
      }, 1200);
    }

    createScoreRows();
    fields.reviewDate.value = today();
    document.addEventListener("input", update);
    document.querySelector("#reset").addEventListener("click", resetForm);
    document.querySelector("#copy").addEventListener("click", copyMarkdown);
    update();
  </script>
</body>
</html>
