<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio Case Builder</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #182230;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-ink: #ffffff;
      --soft: #e6f4f1;
      --shadow: 0 14px 32px rgba(24, 34, 48, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 0.96fr) minmax(340px, 1.04fr);
      gap: 18px;
      align-items: start;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: 0;
    }

    label {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
      color: #344054;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
      font: inherit;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    textarea.large {
      min-height: 118px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--accent-ink);
      background: var(--accent);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      color: var(--ink);
      background: #eef2f7;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    pre {
      min-height: 620px;
      max-height: 780px;
      overflow: auto;
      margin: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101828;
      color: #eef2ff;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .layout,
      .field-grid {
        grid-template-columns: 1fr;
      }

      pre {
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <span class="badge">Portfolio Case Builder</span>
      <h1>実績紹介文をすばやく作る</h1>
      <p>完了した案件や自作ツールを、GitHub README・Notion・ポートフォリオへ貼れる Markdown に整理する。</p>
    </header>

    <div class="layout">
      <section aria-labelledby="input-title">
        <h2 id="input-title">入力</h2>

        <div class="field-grid">
          <label>
            制作物名
            <input id="caseName" value="Opportunity Scorecard" autocomplete="off">
          </label>

          <label>
            種類
            <select id="caseType">
              <option>業務改善ツール</option>
              <option>受託案件</option>
              <option>ポートフォリオ制作</option>
              <option>自社事業実験</option>
            </select>
          </label>
        </div>

        <label>
          課題
          <textarea id="problem" class="large">受託案件や自社事業アイデアを、気分や緊急度だけで選んでしまう課題がありました。判断理由を残せないと、あとから振り返って改善することも難しくなります。</textarea>
        </label>

        <label>
          対応内容
          <textarea id="solution" class="large">売上性、再利用性、実行速度、証明価値、戦略性、リスク低さ、作業負荷の低さを採点し、応募 / 保留 / 見送りを判断できるブラウザツールを作成しました。</textarea>
        </label>

        <label>
          工夫した点
          <textarea id="focus">入力から判定までを1画面で完結させ、Markdownで判断記録を残せるようにしました。外部ライブラリなしで、誰でもHTMLを開くだけで使えます。</textarea>
        </label>

        <label>
          成果
          <textarea id="result">案件選別の判断基準を統一し、応募文作成ツールへつなげられる実務フローを作れました。</textarea>
        </label>

        <label>
          使用技術
          <input id="tech" value="HTML, CSS, JavaScript" autocomplete="off">
        </label>

        <label>
          公開可否メモ
          <textarea id="publicNote">サンプルは架空または一般化した内容です。個人情報、契約情報、APIキーは含めていません。</textarea>
        </label>

        <div class="actions">
          <button id="copy">Markdown をコピー</button>
          <button id="reset" class="secondary">初期値に戻す</button>
          <span class="hint">顧客名、金額、契約条件、個人情報は公開前に必ず伏せてください。</span>
        </div>
      </section>

      <section aria-labelledby="output-title">
        <h2 id="output-title">出力</h2>
        <pre id="output"></pre>
      </section>
    </div>
  </main>

  <script>
    const defaults = {
      caseName: "Opportunity Scorecard",
      caseType: "業務改善ツール",
      problem: "受託案件や自社事業アイデアを、気分や緊急度だけで選んでしまう課題がありました。判断理由を残せないと、あとから振り返って改善することも難しくなります。",
      solution: "売上性、再利用性、実行速度、証明価値、戦略性、リスク低さ、作業負荷の低さを採点し、応募 / 保留 / 見送りを判断できるブラウザツールを作成しました。",
      focus: "入力から判定までを1画面で完結させ、Markdownで判断記録を残せるようにしました。外部ライブラリなしで、誰でもHTMLを開くだけで使えます。",
      result: "案件選別の判断基準を統一し、応募文作成ツールへつなげられる実務フローを作れました。",
      tech: "HTML, CSS, JavaScript",
      publicNote: "サンプルは架空または一般化した内容です。個人情報、契約情報、APIキーは含めていません。"
    };

    const fieldIds = Object.keys(defaults);
    const outputEl = document.querySelector("#output");

    function valueOf(id) {
      return document.querySelector(`#${id}`).value.trim();
    }

    function techLines() {
      return (valueOf("tech") || "-")
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean)
        .map((item) => `- ${item}`)
        .join("\n");
    }

    function buildCaseStudy() {
      const caseName = valueOf("caseName") || "Untitled Case";
      return `# ${caseName}

## Overview

${caseName} は、${valueOf("caseType") || "制作物"}として作成した成果物です。

## Problem

${valueOf("problem") || "-"}

## Solution

${valueOf("solution") || "-"}

## What I Focused On

${valueOf("focus") || "-"}

## Result

${valueOf("result") || "-"}

## Tech

${techLines() || "-"}

## Public Note

${valueOf("publicNote") || "-"}`;
    }

    function update() {
      outputEl.textContent = buildCaseStudy();
    }

    function resetForm() {
      for (const id of fieldIds) {
        document.querySelector(`#${id}`).value = defaults[id];
      }
      update();
    }

    async function copyMarkdown() {
      const text = outputEl.textContent;
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        const buffer = document.createElement("textarea");
        buffer.value = text;
        buffer.setAttribute("readonly", "");
        buffer.style.position = "fixed";
        buffer.style.opacity = "0";
        document.body.appendChild(buffer);
        buffer.select();
        document.execCommand("copy");
        document.body.removeChild(buffer);
      }
      document.querySelector("#copy").textContent = "コピーしました";
      setTimeout(() => {
        document.querySelector("#copy").textContent = "Markdown をコピー";
      }, 1200);
    }

    document.addEventListener("input", update);
    document.querySelector("#copy").addEventListener("click", copyMarkdown);
    document.querySelector("#reset").addEventListener("click", resetForm);
    update();
  </script>
</body>
</html>
