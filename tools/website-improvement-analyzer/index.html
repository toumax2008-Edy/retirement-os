<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Website Improvement Analyzer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #182230;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-ink: #ffffff;
      --soft: #e6f4f1;
      --shadow: 0 14px 32px rgba(24, 34, 48, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(340px, 0.9fr) minmax(0, 1.1fr);
      gap: 18px;
      align-items: start;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: 0;
    }

    label {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      color: #344054;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
      font: inherit;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    textarea.large {
      min-height: 116px;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--accent-ink);
      background: var(--accent);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      color: var(--ink);
      background: #eef2f7;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    pre {
      min-height: 760px;
      max-height: 900px;
      overflow: auto;
      margin: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101828;
      color: #eef2ff;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      pre {
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <span class="badge">Website Improvement Analyzer v1.5</span>
      <h1>診断漏れを防ぎ、改善提案を自然にまとめる</h1>
      <p>企業サイト、LP、ECサイトの良い点、改善点、チェックリストを整理し、営業で渡しやすいMarkdown提案書を作ります。</p>
    </header>

    <div class="layout">
      <section aria-labelledby="input-title">
        <h2 id="input-title">入力</h2>
        <div id="fields"></div>
        <div class="actions">
          <button id="copy">Markdown をコピー</button>
          <button id="reset" class="secondary">サンプルに戻す</button>
          <span class="hint">ブラウザ内に自動保存します。APIキーや外部APIは使いません。</span>
        </div>
      </section>

      <section aria-labelledby="output-title">
        <h2 id="output-title">Markdown出力</h2>
        <pre id="output"></pre>
      </section>
    </div>
  </main>

  <script>
    const storageKey = "retirement-os-website-improvement-analyzer-v15";
    const checklistOptions = ["OK", "要確認", "改善必要", "未確認"];

    const fields = [
      { id: "siteName", label: "サイト名", type: "input", value: "株式会社トータル・ハウスマネジメント" },
      { id: "url", label: "URL", type: "input", value: "https://www.totalhouse-mgt.jp/" },
      { id: "industry", label: "業種", type: "input", value: "不動産管理 / 不動産コンサルティング" },
      { id: "siteType", label: "サイト種別", type: "select", options: ["ホームページ", "LP", "EC", "その他"], value: "ホームページ" },
      { id: "target", label: "ターゲット", type: "textarea", value: "沖縄県内で賃貸管理、不動産売買、相続対策、借地、土地活用について相談したい個人・法人" },
      { id: "firstImpression", label: "第一印象", type: "textarea", value: "信頼材料は多く、対応できる業務の幅も伝わる。一方で、初めて訪問した人が次に何を相談すればよいかは少し迷いやすい。" },
      { id: "strengths", label: "強み", type: "textarea large", value: "賃貸管理、不動産売買、相続対策、借地、土地活用まで幅広く対応できる。管理物件や実績が掲載されており、会社情報や免許番号も確認できるため信頼材料がある。" },
      { id: "goodPoints", label: "良い点", type: "textarea large", value: "対応業務が明記されている。管理物件の実績がある。初回相談無料の案内がある。沖縄県内の具体的な管理エリアや物件種別が見える。" },
      { id: "improvements", label: "改善点", type: "textarea large", value: "ファーストビューで誰のどんな悩みを解決する会社かを具体化したい。問い合わせ導線を目立たせたい。サービス別に相談導線を分けたい。" },
      { id: "priority", label: "優先順位", type: "select", options: ["高", "中", "低"], value: "高" },
      { id: "priorityReason", label: "優先順位の理由", type: "textarea", value: "信頼材料はすでにあるため、見出しとCTAを整理するだけでも問い合わせにつながる可能性がある。" },
      { id: "quickWins", label: "今すぐ改善できること", type: "textarea large", value: "ファーストビューの見出しを具体化する。無料相談ボタンを目立たせる。賃貸管理、相続、借地、土地活用の相談導線を分ける。" },
      { id: "longTerm", label: "中長期で改善すること", type: "textarea large", value: "サービス別ページを整理する。管理実績を強みが伝わる文章にする。FAQを追加する。地域SEOを意識した説明文を増やす。" },
      { id: "design", label: "デザイン", type: "textarea", value: "会社の雰囲気は伝わるが、見出しとCTAにもう少し強弱をつけると行動につながりやすい。" },
      { id: "clarity", label: "情報の分かりやすさ", type: "textarea", value: "対応業務は多いが、サービス別に整理すると初見の理解が早くなる。" },
      { id: "cta", label: "問い合わせ導線", type: "textarea", value: "無料相談や問い合わせボタンをファーストビュー近くで目立たせたい。" },
      { id: "mobile", label: "スマホ対応", type: "textarea", value: "重要情報と問い合わせ導線が下に流れやすい可能性があるため、上部に集約したい。" },
      { id: "speed", label: "表示速度", type: "textarea", value: "画像が多い場合は、画像圧縮と読み込み順の見直し余地がある。" },
      { id: "seo", label: "SEOの気づき", type: "textarea", value: "沖縄、賃貸管理、相続対策、借地相談、土地活用などの検索語を、見出しや説明文に自然に入れる余地がある。" },
      { id: "aiIdeas", label: "AIで改善できそうな点", type: "textarea large", value: "サービス別の説明文、FAQ、管理実績の紹介文、問い合わせ導線の文言を短時間で複数案作成できる。" },
      { id: "seoTitle", label: "SEO: タイトルが分かりやすいか", type: "select", options: checklistOptions, value: "要確認" },
      { id: "seoHeadings", label: "SEO: 見出しが整理されているか", type: "select", options: checklistOptions, value: "改善必要" },
      { id: "seoKeywords", label: "SEO: 検索されそうな言葉が入っているか", type: "select", options: checklistOptions, value: "要確認" },
      { id: "seoServices", label: "SEO: 事業内容・サービス内容が明確か", type: "select", options: checklistOptions, value: "OK" },
      { id: "ctaButton", label: "CTA: 問い合わせボタンが分かりやすいか", type: "select", options: checklistOptions, value: "改善必要" },
      { id: "ctaAction", label: "CTA: 次に取ってほしい行動が明確か", type: "select", options: checklistOptions, value: "改善必要" },
      { id: "ctaWords", label: "CTA: ボタン文言が具体的か", type: "select", options: checklistOptions, value: "要確認" },
      { id: "ctaRepeat", label: "CTA: ページ内に複数あるか", type: "select", options: checklistOptions, value: "要確認" },
      { id: "mobileText", label: "スマホ: 文字が読みやすいか", type: "select", options: checklistOptions, value: "要確認" },
      { id: "mobileButton", label: "スマホ: ボタンが押しやすいか", type: "select", options: checklistOptions, value: "要確認" },
      { id: "mobileSpacing", label: "スマホ: 画像や文章が詰まりすぎていないか", type: "select", options: checklistOptions, value: "要確認" },
      { id: "mobileImportant", label: "スマホ: 重要情報がすぐ分かるか", type: "select", options: checklistOptions, value: "改善必要" },
      { id: "fvSite", label: "ファーストビュー: 何のサイトか分かるか", type: "select", options: checklistOptions, value: "要確認" },
      { id: "fvTarget", label: "ファーストビュー: 誰向けか分かるか", type: "select", options: checklistOptions, value: "改善必要" },
      { id: "fvStrength", label: "ファーストビュー: 強みや特徴が伝わるか", type: "select", options: checklistOptions, value: "改善必要" },
      { id: "fvCta", label: "ファーストビュー: 導線が見えるか", type: "select", options: checklistOptions, value: "改善必要" },
      { id: "trustCases", label: "信頼材料: 実績・事例・お客様の声があるか", type: "select", options: checklistOptions, value: "OK" },
      { id: "trustCompany", label: "信頼材料: 会社情報・店舗情報が分かるか", type: "select", options: checklistOptions, value: "OK" },
      { id: "trustPrice", label: "信頼材料: 料金やサービス内容が分かりやすいか", type: "select", options: checklistOptions, value: "要確認" },
      { id: "trustAnxiety", label: "信頼材料: 不安を減らす説明があるか", type: "select", options: checklistOptions, value: "要確認" },
      { id: "speedHeavy", label: "表示速度: 表示が重く感じるか", type: "select", options: checklistOptions, value: "未確認" },
      { id: "speedImages", label: "表示速度: 画像が多すぎないか", type: "select", options: checklistOptions, value: "未確認" },
      { id: "speedFirstView", label: "表示速度: ファーストビューの読み込みが遅くないか", type: "select", options: checklistOptions, value: "未確認" },
      { id: "speedMemo", label: "表示速度メモ", type: "textarea", value: "体感で重い場合は、画像圧縮、不要画像の削減、ファーストビュー画像の見直しから確認する。" },
      { id: "topPriority", label: "最優先で直すべき点", type: "textarea", value: "ファーストビューの見出しと問い合わせ導線を整理する。" },
      { id: "nextPriority", label: "次に直すべき点", type: "textarea", value: "サービス別の説明と相談導線を分ける。" },
      { id: "laterPriority", label: "余裕があれば直す点", type: "textarea", value: "FAQ、事例紹介、地域SEO向けの説明文を追加する。" },
      { id: "tone", label: "提案トーン", type: "select", options: ["やわらかい", "標準", "営業向け"], value: "やわらかい" },
      { id: "memo", label: "メモ", type: "textarea", value: "否定ではなく、今ある信頼材料を問い合わせにつながる形に整理する提案として伝える。" }
    ];

    const checklistGroups = [
      { title: "SEOチェック", items: [["seoTitle", "タイトルが分かりやすいか"], ["seoHeadings", "見出しが整理されているか"], ["seoKeywords", "検索されそうな言葉が入っているか"], ["seoServices", "事業内容・サービス内容が明確か"]] },
      { title: "CTAチェック", items: [["ctaButton", "問い合わせボタンが分かりやすいか"], ["ctaAction", "次に取ってほしい行動が明確か"], ["ctaWords", "ボタン文言が具体的か"], ["ctaRepeat", "CTAがページ内に複数あるか"]] },
      { title: "スマホ対応チェック", items: [["mobileText", "スマホで文字が読みやすいか"], ["mobileButton", "ボタンが押しやすいか"], ["mobileSpacing", "画像や文章が詰まりすぎていないか"], ["mobileImportant", "重要情報がすぐ分かるか"]] },
      { title: "ファーストビューチェック", items: [["fvSite", "最初の画面で何のサイトか分かるか"], ["fvTarget", "誰向けのサービスか分かるか"], ["fvStrength", "強みや特徴が伝わるか"], ["fvCta", "問い合わせ・購入などの導線が見えるか"]] },
      { title: "信頼材料チェック", items: [["trustCases", "実績・事例・お客様の声があるか"], ["trustCompany", "会社情報・店舗情報が分かるか"], ["trustPrice", "料金やサービス内容が分かりやすいか"], ["trustAnxiety", "不安を減らす説明があるか"]] },
      { title: "表示速度チェック", items: [["speedHeavy", "表示が重く感じるか"], ["speedImages", "画像が多すぎないか"], ["speedFirstView", "ファーストビューの読み込みが遅くないか"]] }
    ];

    const fieldsEl = document.querySelector("#fields");
    const outputEl = document.querySelector("#output");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function createFields() {
      const saved = loadState();
      fieldsEl.innerHTML = fields.map((field) => {
        const value = saved[field.id] ?? field.value;
        let control = "";
        if (field.type === "select") {
          const options = field.options.map((option) => `<option ${option === value ? "selected" : ""}>${option}</option>`).join("");
          control = `<select id="${field.id}">${options}</select>`;
        } else if (field.type === "input") {
          control = `<input id="${field.id}" value="${escapeHtml(value)}" autocomplete="off">`;
        } else {
          const className = field.type.includes("large") ? "large" : "";
          control = `<textarea id="${field.id}" class="${className}">${escapeHtml(value)}</textarea>`;
        }
        return `<label>${field.label}${control}</label>`;
      }).join("");
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || {};
      } catch (error) {
        return {};
      }
    }

    function saveState(data) {
      localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function collectInput() {
      return fields.reduce((acc, field) => {
        acc[field.id] = document.querySelector(`#${field.id}`).value.trim();
        return acc;
      }, {});
    }

    function value(data, id) {
      return data[id] || "-";
    }

    function bulletLines(text) {
      return String(text || "-")
        .split(/。|\n/)
        .map((item) => item.trim())
        .filter(Boolean)
        .map((item) => `- ${item}。`)
        .join("\n") || "- -";
    }

    function buildChecklistMarkdown(data) {
      return checklistGroups.map((group) => {
        const rows = group.items.map(([id, label]) => `- ${label}: ${value(data, id)}`).join("\n");
        return `### ${group.title}\n\n${rows}`;
      }).join("\n\n");
    }

    function buildChecklistSummary(data) {
      const needs = [];
      const watch = [];
      checklistGroups.forEach((group) => {
        group.items.forEach(([id, label]) => {
          if (data[id] === "改善必要") {
            needs.push(`${group.title}: ${label}`);
          }
          if (data[id] === "要確認") {
            watch.push(`${group.title}: ${label}`);
          }
        });
      });
      return {
        needs: needs.slice(0, 5),
        watch: watch.slice(0, 5)
      };
    }

    function buildPriorityMarkdown(data) {
      const summary = buildChecklistSummary(data);
      const needsText = summary.needs.length ? summary.needs.map((item) => `- ${item}`).join("\n") : "- 大きな改善必要項目は未入力です。";
      const watchText = summary.watch.length ? summary.watch.map((item) => `- ${item}`).join("\n") : "- 要確認項目は未入力です。";
      return `### 最優先で直すべき点\n\n${bulletLines(value(data, "topPriority"))}\n\nチェック上の改善必要項目:\n${needsText}\n\n### 次に直すべき点\n\n${bulletLines(value(data, "nextPriority"))}\n\nチェック上の要確認項目:\n${watchText}\n\n### 余裕があれば直す点\n\n${bulletLines(value(data, "laterPriority"))}`;
    }

    function trimSentenceEnd(text) {
      return String(text || "-").replace(/[。.!！?？]+$/g, "");
    }

    function buildShortProposal(data) {
      return `${value(data, "siteName")}は、サイト全体として信頼材料や基本情報は掲載されています。一方で、${trimSentenceEnd(value(data, "topPriority"))}ことで、初めて訪問した人が次の行動を取りやすくなります。まずはこの部分から着手し、次に${trimSentenceEnd(value(data, "nextPriority"))}流れにすると、営業・問い合わせ面で効果が出やすいです。`;
    }

    function buildProposalDraft(data) {
      const opening = value(data, "tone") === "やわらかい"
        ? `${value(data, "siteName")}のサイトを拝見しました。現在のサイトには、会社の実在感や対応業務の幅が伝わる良い材料がすでにあります。`
        : `${value(data, "siteName")}のサイト改善について、以下の通りご提案します。`;

      return `${opening}

特に良い点は、${value(data, "strengths")}という点です。

一方で、初めて訪問した方が「自分は何を相談できるのか」「次に何をすればよいのか」をすぐ判断できるようにすると、問い合わせにつながりやすくなると考えます。

チェックリスト上でも、ファーストビュー、CTA、スマホでの重要情報の見え方は優先して確認したい項目です。

まずは、${trimSentenceEnd(value(data, "topPriority"))}ことから着手するのがおすすめです。具体的には、次の内容を先に整えると改善効果を確認しやすくなります。

${bulletLines(value(data, "quickWins"))}

次に、${trimSentenceEnd(value(data, "nextPriority"))}ことを進めると、サイトを見た人が相談内容を選びやすくなります。

中長期では、${value(data, "longTerm")}ことで、検索流入や相談前の安心感も高められます。

AIを活用すれば、${value(data, "aiIdeas")}ため、短時間で複数案を比較しながら改善できます。

今回の提案は、今ある信頼材料を活かしながら、問い合わせにつながる形に整理することを目的としています。`;
    }

    function buildMarkdown(data) {
      return `# サイト改善診断レポート

## サイト概要

- サイト名: ${value(data, "siteName")}
- URL: ${value(data, "url")}
- 業種: ${value(data, "industry")}
- サイト種別: ${value(data, "siteType")}
- ターゲット: ${value(data, "target")}

## 総評

${value(data, "firstImpression")}

## 強み

${bulletLines(value(data, "strengths"))}

## 良い点

${bulletLines(value(data, "goodPoints"))}

## 改善点

${bulletLines(value(data, "improvements"))}

## 優先順位

- 優先度: ${value(data, "priority")}
- 理由: ${value(data, "priorityReason")}

## 診断チェックリスト

${buildChecklistMarkdown(data)}

## 改善優先度

${buildPriorityMarkdown(data)}

## 今すぐ改善できること

${bulletLines(value(data, "quickWins"))}

## 中長期で改善すること

${bulletLines(value(data, "longTerm"))}

## 診断メモ

- デザイン: ${value(data, "design")}
- 情報の分かりやすさ: ${value(data, "clarity")}
- 問い合わせ導線: ${value(data, "cta")}
- スマホ対応: ${value(data, "mobile")}
- 表示速度: ${value(data, "speed")}
- 表示速度メモ: ${value(data, "speedMemo")}
- SEOの気づき: ${value(data, "seo")}

## AI活用の提案

${bulletLines(value(data, "aiIdeas"))}

## 提案書の短い版

${buildShortProposal(data)}

## 提案書の詳しい版

${buildProposalDraft(data)}

## Memo

${value(data, "memo")}`;
    }

    function update() {
      const data = collectInput();
      saveState(data);
      outputEl.textContent = buildMarkdown(data);
    }

    function resetForm() {
      localStorage.removeItem(storageKey);
      createFields();
      update();
    }

    async function copyMarkdown() {
      const text = outputEl.textContent;
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        const buffer = document.createElement("textarea");
        buffer.value = text;
        buffer.setAttribute("readonly", "");
        buffer.style.position = "fixed";
        buffer.style.opacity = "0";
        document.body.appendChild(buffer);
        buffer.select();
        document.execCommand("copy");
        document.body.removeChild(buffer);
      }
      const button = document.querySelector("#copy");
      button.textContent = "コピーしました";
      setTimeout(() => {
        button.textContent = "Markdown をコピー";
      }, 1200);
    }

    createFields();
    document.addEventListener("input", update);
    document.addEventListener("change", update);
    document.querySelector("#copy").addEventListener("click", copyMarkdown);
    document.querySelector("#reset").addEventListener("click", resetForm);
    update();
  </script>
</body>
</html>
